<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Md. Monjurul Haque</title>
    <style>
        /* Dark Futuristic & Glassmorphism Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #09101a, #101c2b, #192a40);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Background Elements */
        .circle-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: #e2136e;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            z-index: 0;
        }
        .circle-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: #00f2fe;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
            z-index: 0;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
            position: relative;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #e2136e, #ff4081);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(226, 19, 110, 0.5);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.2);
        }

        p {
            font-size: 15px;
            color: #b0c4de;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* bKash Highlight Box */
        .bkash-box {
            background: rgba(226, 19, 110, 0.1);
            border: 1px solid rgba(226, 19, 110, 0.4);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .bkash-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .bkash-title {
            color: #ffb6c1;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .bkash-number {
            font-size: 28px;
            font-weight: bold;
            color: #e2136e;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(226, 19, 110, 0.3);
        }

        /* Button Styling */
        .copy-btn {
            background: linear-gradient(135deg, #e2136e, #c40f5e);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 5px 15px rgba(226, 19, 110, 0.4);
        }

        .copy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(226, 19, 110, 0.6);
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #e2136e;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 12px 24px;
            position: fixed;
            z-index: 100;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 40px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 40px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>

    <!-- Background Glows -->
    <div class="circle-1"></div>
    <div class="circle-2"></div>

    <!-- Main Content Card -->
    <div class="glass-card">
        <div class="avatar">☕</div>
        <h1>আমাকে সাপোর্ট করুন</h1>
        <p>আমি মোঃ মঞ্জুরুল হক। আমার শিক্ষামূলক কন্টেন্ট, ওয়েবসাইটের রিসোর্স বা কোডগুলো আপনার উপকারে আসলে, নিচের বিকাশ নম্বরে সাপোর্ট করতে পারেন। এটি আমার প্রজেক্টগুলোকে সচল রাখতে সাহায্য করবে।</p>
        
        <div class="bkash-box">
            <div class="bkash-title">bKash (Personal)</div>
            <div class="bkash-number" id="bkashNumber">01912125156</div>
        </div>
        
        <button class="copy-btn" onclick="copyNumber()">নাম্বারটি কপি করুন</button>
    </div>

    <!-- Notification -->
    <div id="toast">✅ বিকাশ নাম্বারটি কপি করা হয়েছে!</div>

    <!-- JavaScript -->
    <script>
        function copyNumber() {
            var numberText = document.getElementById("bkashNumber").innerText;
            navigator.clipboard.writeText(numberText).then(function() {
                var toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(function(){ 
                    toast.className = toast.className.replace("show", ""); 
                }, 3000);
            });
        }
    </script>

</body>
</html>
